[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = [".venv", "postgres", "data", "reports", "backup"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
    "RUF",  # ruff-specific
]
ignore = [
    "E501",    # line too long (we rely on ruff-format for line wrapping)
    "B008",    # function call in default argument (FastAPI pattern)
    "RUF001",  # ambiguous characters in strings (German en dashes are intentional)
    "RUF002",  # ambiguous characters in docstrings
    "RUF003",  # ambiguous characters in comments
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B", "E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
